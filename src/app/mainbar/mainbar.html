@let _user = auth.user();
<div class="bg-primary flex flex-wrap justify-center items-center p-2">
  <h1 class="text-primary-contrast text-2xl text-center font-bold">
    <a routerLink="/">{{ title }}</a>
  </h1>
  <ul class="ms-auto max-[20rem]:me-auto flex items-center *:leading-0 **:[button]:**:leading-0!">
    <li>
      @let _selectedScheme = colorScheme.selectedScheme();
      <button pButton pRipple rounded size="small" type="button" [icon]="_selectedScheme.icon"
              (click)="colorSchemeMenu.toggle($event)"
              aria-label="Change the {{ _selectedScheme.value }} color scheme."></button>
      <a pButton pRipple rounded size="small" routerLink="/profiles" icon="pi pi-users"
         aria-label="Profiles" routerLinkActive="border-surface" ariaCurrentWhenActive="page"
         [routerLinkActiveOptions]="{ exact: true }"></a>
      <p-menu #colorSchemeMenu [model]="colorSchemeMenuItems()" ariaLabel="Color scheme menu"
              [popup]="true" />
    </li>
    @if (_user) {
    <li>
      <button pButton pRipple text rounded outlined type="button" class="p-0 ms-2"
              aria-label="Toggle profile menu" (click)="profileMenu.toggle($event)">
        <app-avatar [user]="_user" size="xs" />
      </button>
      <p-menu #profileMenu [model]="profileMenuItems()" ariaLabel="Profile menu" [popup]="true" />
    </li>
    }
  </ul>
</div>
