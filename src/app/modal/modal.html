<p-dialog modal maximizable [visible]="visible()" [resizable]="false" [draggable]="false"
          [closeAriaLabel]="closeAriaLabel()" styleClass="h-full w-[calc(100%-2rem)]"
          [showHeader]="showHeader()" [header]="header()" (onMaximize)="handleMaximize()"
          (onHide)="handleHide()" (onShow)="handleShow()"
          (visibleChange)="handleVisibilityChange($event)">
  <ng-content />
</p-dialog>
